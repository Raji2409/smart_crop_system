<!DOCTYPE html>
<html>
<head>
    <title>Crop Health Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #d4fc79, #96e6a1);
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h2 {
            margin-top: 25px;
        }

        .chart-container {
            width: 70%;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* 🔥 IMPORTANT FIX */
        .chart-box {
            position: relative;
            height: 400px;
            width: 100%;
        }

        .btn {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            border-radius: 6px;
            margin: 30px 0;
            cursor: pointer;
            font-size: 14px;
        }

        .btn:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

<h2>📊 Crop Health Monitoring Analytics</h2>
<p>Welcome, {{ username | default("Admin") }}</p>

<!-- 🌿 Disease Chart -->
<div class="chart-container">
    <h3>Disease Frequency</h3>
    <div class="chart-box">
        <canvas id="diseaseChart"></canvas>
    </div>
</div>

<!-- 🌡 Stress Chart -->
<div class="chart-container">
    <h3>Stress Distribution</h3>
    <div class="chart-box">
        <canvas id="stressChart"></canvas>
    </div>
</div>

<!-- 📊 Daily Prediction Chart -->
<div class="chart-container">
    <h3>Daily Prediction Count</h3>
    <div class="chart-box">
        <canvas id="predictionChart"></canvas>
    </div>
</div>

<a href="/admin">
    <button class="btn">⬅ Back to Dashboard</button>
</a>

<script>
    // 🌿 Disease Chart
    new Chart(document.getElementById('diseaseChart'), {
        type: 'bar',
        data: {
            labels: {{ disease_labels | default([]) | tojson }},
            datasets: [{
                label: 'Number of Cases',
                data: {{ disease_values | default([]) | tojson }},
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });

    // 🌡 Stress Chart
    new Chart(document.getElementById('stressChart'), {
        type: 'pie',
        data: {
            labels: {{ stress_labels | default(["Healthy","Stress"]) | tojson }},
            datasets: [{
                data: {{ stress_values | default([0,0]) | tojson }}
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });

    // 📊 Daily Prediction Count Chart
    new Chart(document.getElementById('predictionChart'), {
        type: 'line',
        data: {
            labels: {{ prediction_dates | default([]) | tojson }},
            datasets: [{
                label: 'Number of Predictions',
                data: {{ prediction_counts | default([]) | tojson }},
                borderColor: 'blue',
                backgroundColor: 'blue',
                tension: 0.3,
                fill: false,
                pointRadius: 5
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: {
                    title: {
                        display: true,
                        text: 'Date'
                    }
                },
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: 'Number of Predictions'
                    },
                    ticks: {
                        precision: 0
                    }
                }
            }
        }
    });
</script>

</body>
</html>
